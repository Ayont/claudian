<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claudian visual harness</title>
  <!-- Minimal Obsidian theme vars the components rely on (normally injected by Obsidian). -->
  <style>
    :root {
      --background-primary: #1e1e22;
      --background-primary-alt: #232327;
      --background-secondary: #26262b;
      --background-secondary-alt: #2b2b31;
      --background-modifier-border: #3a3a40;
      --background-modifier-border-hover: #4a4a52;
      --background-modifier-hover: #2f2f35;
      --text-normal: #e6e6e6;
      --text-muted: #a0a0a8;
      --text-faint: #6a6a72;
      --interactive-accent: #D97757;
      --color-red: #e5534b;
      --font-interface: -apple-system, system-ui, sans-serif;
      --font-text: -apple-system, system-ui, sans-serif;
      --font-monospace: ui-monospace, monospace;
      /* Provider brand drives --cl-accent (see variables.css). Default = Claude. */
      --claudian-brand: #D97757;
      --claudian-brand-rgb: 217, 119, 87;
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--background-primary);
      color: var(--text-normal);
      font-family: var(--font-interface);
    }
    .harness-section { margin-bottom: 28px; max-width: 720px; }
    .harness-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .harness-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    /* Stand-in for setIcon's injected SVG so layout/box sizing is representative. */
    .harness-section svg { width: 100%; height: 100%; }
  </style>
  <!-- The real, built component styles. -->
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body class="theme-dark">
  <!-- Goal banner (active) -->
  <div class="harness-section" data-vis="goal-banner">
    <div class="harness-label">Goal banner</div>
    <div class="claudian-goal-banner-host">
      <div class="claudian-goal-banner">
        <span class="claudian-goal-banner-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="1"/></svg></span>
        <div class="claudian-goal-banner-body">
          <div class="claudian-goal-banner-head">
            <span class="claudian-goal-banner-label">Goal aktiv</span>
            <span class="claudian-goal-banner-provider">Claude</span>
          </div>
          <div class="claudian-goal-banner-text">Release 2.6.0 fertigstellen, alle Tests grün halten und sauber dokumentieren.</div>
        </div>
        <button class="claudian-goal-banner-clear" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Permission toggle: Safe / YOLO / AUTO -->
  <div class="harness-section" data-vis="permission-toggle">
    <div class="harness-label">Permission toggle</div>
    <div class="harness-row">
      <div class="claudian-permission-toggle">
        <span class="claudian-permission-label">Safe</span>
        <div class="claudian-toggle-switch"></div>
      </div>
      <div class="claudian-permission-toggle">
        <span class="claudian-permission-label">YOLO</span>
        <div class="claudian-toggle-switch active"></div>
      </div>
      <div class="claudian-permission-toggle">
        <span class="claudian-permission-label auto-active">AUTO</span>
        <div class="claudian-toggle-switch active auto"></div>
      </div>
    </div>
  </div>

  <!-- Status bar with AUTO badge -->
  <div class="harness-section" data-vis="statusbar">
    <div class="harness-label">Status bar</div>
    <div class="claudian-statusbar">
      <span class="claudian-statusbar-dot"></span>
      <span class="claudian-statusbar-name">Claude</span>
      <span class="claudian-statusbar-state is-ready">bereit</span>
      <span class="claudian-statusbar-pct">42%</span>
      <span class="claudian-statusbar-auto">AUTO</span>
    </div>
  </div>

  <!-- Switch-model action -->
  <div class="harness-section" data-vis="switch-model">
    <div class="harness-label">Switch-model action</div>
    <div class="claudian-message">
      <div class="claudian-message-content">
        <div class="claudian-response-footer">
          <span class="claudian-baked-duration">* Baked for 00:03</span>
          <span class="claudian-switch-model-btn" style="opacity:1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3 4 7l4 4M4 7h16M16 21l4-4-4-4M20 17H4"/></svg>
            <span class="claudian-switch-model-label">Modell wechseln</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
